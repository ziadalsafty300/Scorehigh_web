<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In | ScoreHigh Tutoring</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-container { max-width: 400px; margin: 4rem auto; padding: 2rem; background: var(--white); border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .form-group { margin-bottom: 1.5rem; text-align: left; }
    .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--navy); }
    .form-group input { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; }
    .error-msg { color: #e74c3c; font-size: 0.9rem; margin-top: 0.5rem; display: none; }
  </style>
</head>
<body class="bg-light">
  <nav class="navbar">
    <div class="container navbar-container">
      <a href="index.html" class="nav-brand">ScoreHigh</a>
    </div>
  </nav>

  <main class="container text-center">
    <div class="auth-container card">
      <h1 style="color: var(--navy); margin-bottom: 0.5rem; font-size: 2rem;">Welcome Back</h1>
      <p class="text-muted" style="margin-bottom: 2rem;">Log in to access your study plans.</p>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        <div id="login-error" class="error-msg"></div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" id="loginBtn">Log In</button>
      </form>
      
      <p style="margin-top: 1.5rem; font-size: 0.95rem;">
        Don't have an account? <a href="signup.html" style="color: var(--primary); font-weight: 600;">Sign up</a>
      </p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const errDiv = document.getElementById('login-error');
      
      btn.innerText = 'Logging in...';
      btn.disabled = true;
      errDiv.style.display = 'none';

      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      
      if (error) {
        errDiv.innerText = error.message;
        errDiv.style.display = 'block';
        btn.innerText = 'Log In';
        btn.disabled = false;
      } else {
        window.location.href = 'dashboard.html';
      }
    });
  </script>
</body>
</html>
